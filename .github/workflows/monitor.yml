name: Listing Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

# Queue runs back-to-back instead of overlapping. Prior to this, the cron
# fired every 10 min but real runs took 20-30 min, so 2-3 jobs would execute
# in parallel, each loading the same data/seen_listings.json and firing
# duplicate Telegram alerts for the same items.
concurrency:
  group: monitor-pokemon
  cancel-in-progress: false

jobs:
  pokemon:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Install xvfb for headless browser
        run: sudo apt-get install -y xvfb

      - name: Create env file
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "SEARCH_TERM=1996 no rarity" >> .env

      - name: Run norarityscanner (Pokemon games)
        run: xvfb-run --auto-servernum python monitor.py

      - name: Save state
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/seen_listings.json || true
          git diff --staged --quiet || git commit -m "Update state (pokemon)"
          git pull --rebase || true
          git push || true
