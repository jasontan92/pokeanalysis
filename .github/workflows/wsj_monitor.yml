name: WSJ Manga Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Install xvfb for headless browser
        run: sudo apt-get install -y xvfb

      - name: Create env file
        run: |
          echo "WSJ_TELEGRAM_BOT_TOKEN=${{ secrets.WSJ_TELEGRAM_BOT_TOKEN }}" >> .env
          echo "WSJ_TELEGRAM_CHAT_ID=${{ secrets.WSJ_TELEGRAM_CHAT_ID }}" >> .env

      - name: Run WSJ monitor
        run: xvfb-run --auto-servernum python wsj_monitor.py

      - name: Save state
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/wsj_seen_listings.json || true
          git diff --staged --quiet || git commit -m "Update WSJ state"
          git pull --rebase || true
          git push || true
